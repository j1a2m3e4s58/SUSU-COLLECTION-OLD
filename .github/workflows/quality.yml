name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm audit --audit-level=moderate
      - run: npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r mail-api/requirements.txt pip-audit
      - run: pip-audit -r mail-api/requirements.txt
      - run: python -m unittest discover -s mail-api/tests -v
      - run: python -m py_compile mail-api/app.py mail-api/storage_backend.py
